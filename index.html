<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פורטל חתימה על מסמכים</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --ink:       #0f0f0f;
  --ink-light: #555;
  --border:    #e2e2e2;
  --bg:        #f7f6f3;
  --white:     #ffffff;
  --blue:      #1d4ed8;
  --blue-dark: #1e3a8a;
  --red:       #dc2626;
  --green:     #16a34a;
  --r:         10px;
  --sh:        0 2px 16px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; direction: rtl; }
.screen { display: none; }
.screen.active { display: flex; }

/* ── LOADING ── */
#loading-screen { flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .75s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--ink-light); }

/* ── LOGIN ── */
#login-screen { align-items: center; justify-content: center; min-height: 100vh; }
.login-wrap { width: 100%; max-width: 400px; padding: 24px; }
.login-logo { font-family: 'DM Serif Display', serif; font-size: 28px; margin-bottom: 6px; }
.login-logo span { color: var(--blue); }
.login-sub { font-size: 14px; color: var(--ink-light); margin-bottom: 36px; }
.card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 32px; box-shadow: var(--sh); }
.field { margin-bottom: 18px; }
.field label { display: block; font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 7px; }
.field input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--r); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); outline: none; transition: border-color .18s; direction: ltr; text-align: right; }
.field input:focus { border-color: var(--blue); }
.err { display: none; font-size: 13px; color: var(--red); margin-bottom: 14px; }
.btn-primary { width: 100%; padding: 13px; border: none; border-radius: var(--r); background: var(--ink); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
.btn-primary:hover { opacity: .9; }

/* ── DASHBOARD ── */
#dashboard-screen { flex-direction: column; min-height: 100vh; }
.topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar-brand { font-family: 'DM Serif Display', serif; font-size: 22px; }
.topbar-brand span { color: var(--blue); }
.topbar-user { font-size: 13px; color: var(--ink-light); }
.dash-body { max-width: 860px; width: 100%; margin: 0 auto; padding: 36px 24px; }
.dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
.dash-title { font-family: 'DM Serif Display', serif; font-size: 26px; }
.upload-btn { display: flex; align-items: center; gap: 8px; padding: 11px 20px; background: var(--blue); color: white; border: none; border-radius: var(--r); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
.upload-btn:hover { opacity: .88; }
#file-input { display: none; }
.section-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 10px; margin-top: 28px; }
.doc-list { display: flex; flex-direction: column; gap: 8px; }
.doc-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 12px; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; transition: border-color .18s, box-shadow .18s; }
.doc-card.clickable { cursor: pointer; }
.doc-card.clickable:hover { border-color: var(--blue); box-shadow: 0 2px 12px rgba(29,78,216,.08); }
.doc-left { display: flex; align-items: center; gap: 14px; }
.doc-icon { width: 42px; height: 42px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.doc-icon.pdf  { background: #fee2e2; }
.doc-icon.docx { background: #dbeafe; }
.doc-icon.xlsx { background: #dcfce7; }
.doc-icon.other{ background: #f3f4f6; }
.doc-name { font-size: 14px; font-weight: 600; }
.doc-date { font-size: 12px; color: var(--ink-light); margin-top: 2px; }
.badge { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; flex-shrink: 0; }
.badge.pending   { background: #fef9c3; color: #854d0e; }
.badge.completed { background: #dcfce7; color: #166534; }
.empty { background: var(--white); border: 1.5px dashed var(--border); border-radius: 12px; padding: 28px; text-align: center; color: var(--ink-light); font-size: 14px; }

/* ── VIEWER ── */
#viewer-screen { flex-direction: column; min-height: 100vh; }
.viewer-topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; }
.vtop-left { display: flex; flex-direction: column; gap: 2px; }
.vtop-brand { font-family: 'DM Serif Display', serif; font-size: 18px; }
.vtop-file { font-size: 12px; color: var(--ink-light); max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.vtop-right { display: flex; gap: 10px; align-items: center; }
.btn-back { background: none; border: 1.5px solid var(--border); border-radius: var(--r); padding: 9px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; color: var(--ink); }
.btn-back:hover { border-color: var(--ink); }
.btn-submit { padding: 10px 22px; background: var(--blue); color: var(--white); border: none; border-radius: var(--r); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.btn-submit:hover { background: var(--blue-dark); }
.btn-submit:disabled { opacity: .42; cursor: not-allowed; }
.viewer-body { display: flex; flex: 1; height: calc(100vh - 57px); overflow: hidden; }

/* PDF viewer */
.doc-area { flex: 1; overflow-y: auto; background: #3a3a3a; padding: 28px 20px; display: flex; flex-direction: column; align-items: center; }
.page-wrap { position: relative; margin-bottom: 20px; box-shadow: 0 6px 32px rgba(0,0,0,.4); }
canvas.pdf-page { display: block; max-width: 100%; background: white; }

/* Signature strip — appended to last PDF page */
.sig-strip {
  background: #fff;
  border-top: 2px solid #ccc;
  width: 100%;
  padding: 16px 24px 12px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  direction: rtl;
}
.strip-field { display: flex; flex-direction: column; align-items: center; flex: 1; }
.strip-line { width: 100%; border-bottom: 1.5px solid #333; margin-bottom: 5px; min-height: 42px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4px; }
.strip-label { font-size: 10px; color: #666; font-weight: 600; letter-spacing: .04em; }
.strip-input { border: none; outline: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); text-align: center; width: 100%; }
.strip-date-val { font-size: 12px; color: #555; text-align: center; }
.sig-canvas-wrap { width: 180px; height: 58px; position: relative; cursor: crosshair; border-bottom: 1.5px solid #333; margin-bottom: 5px; }
#sig-canvas { width: 180px; height: 58px; display: block; touch-action: none; }
.sig-ghost { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #bbb; pointer-events: none; }
.clear-link { font-size: 10px; color: var(--ink-light); cursor: pointer; text-decoration: underline; background: none; border: none; font-family: 'DM Sans', sans-serif; }

/* DOCX / XLSX */
.docx-area { flex: 1; overflow-y: auto; background: white; padding: 48px 56px; font-size: 14px; line-height: 1.75; direction: ltr; text-align: left; }
.xlsx-area { flex: 1; overflow: auto; background: white; padding: 24px; }
.xlsx-area table { border-collapse: collapse; font-size: 13px; }
.xlsx-area td, .xlsx-area th { border: 1px solid #ddd; padding: 6px 12px; }
.xlsx-area th { background: #f3f4f6; font-weight: 600; }

/* Sidebar for non-PDF */
.sign-sidebar { width: 280px; background: var(--white); border-right: 1px solid var(--border); padding: 28px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }
.sidebar-title { font-family: 'DM Serif Display', serif; font-size: 18px; }
.sidebar-hr { height: 1px; background: var(--border); margin: 0 -20px; }
.sf-label { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 7px; }
.sf-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--r); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); outline: none; }
.sf-input:focus { border-color: var(--blue); }
.sf-canvas-wrap { border: 1.5px dashed var(--border); border-radius: var(--r); background: #fafafa; position: relative; overflow: hidden; }
#sig-canvas-side { display: block; width: 100%; height: 100px; cursor: crosshair; touch-action: none; }
.sf-ghost { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #bbb; pointer-events: none; }
.legal { font-size: 11px; color: #aaa; line-height: 1.6; border-top: 1px solid var(--border); padding-top: 14px; }
.already-signed { background: #dcfce7; color: #166534; border-radius: var(--r); padding: 14px; font-size: 13px; font-weight: 600; text-align: center; }

/* ── SUCCESS ── */
#success-screen { flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 32px; gap: 14px; }
.success-icon { width: 76px; height: 76px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 34px; }
#success-screen h2 { font-family: 'DM Serif Display', serif; font-size: 30px; }
#success-screen p  { font-size: 15px; color: var(--ink-light); max-width: 380px; line-height: 1.6; }
.btn-download { padding: 12px 28px; background: var(--green); color: white; border: none; border-radius: var(--r); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
.btn-download:hover { opacity: .88; }
.btn-ghost2 { padding: 10px 22px; background: none; border: 1.5px solid var(--border); border-radius: var(--r); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; color: var(--ink); }

/* ── ERROR ── */
#error-screen { flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 32px; gap: 12px; }
#error-screen h2 { font-family: 'DM Serif Display', serif; font-size: 26px; }
#error-screen p  { font-size: 14px; color: var(--ink-light); max-width: 380px; line-height: 1.6; }

@media (max-width: 680px) {
  .viewer-body { flex-direction: column; height: auto; }
  .sign-sidebar { width: 100%; border-right: none; border-top: 1px solid var(--border); }
  .doc-area { padding: 12px 8px; }
  .sig-strip { flex-direction: column; align-items: center; }
  .dash-body { padding: 20px 14px; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen" class="screen">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">טוען…</div>
</div>

<!-- LOGIN -->
<div id="login-screen" class="screen">
  <div class="login-wrap">
    <div class="login-logo">חתימה<span>.</span></div>
    <div class="login-sub">מערכת חתימה אלקטרונית מאובטחת</div>
    <div class="card">
      <div class="field">
        <label>שם משתמש</label>
        <input type="text" id="username" placeholder="הזן שם משתמש" autocomplete="off">
      </div>
      <div class="field">
        <label>סיסמה</label>
        <input type="password" id="password" placeholder="הזן סיסמה">
      </div>
      <div class="err" id="login-err">שם משתמש או סיסמה שגויים</div>
      <button class="btn-primary" onclick="doLogin()">כניסה ←</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen" class="screen">
  <div class="topbar">
    <div class="topbar-brand">חתימה<span>.</span></div>
    <div class="topbar-user" id="topbar-user"></div>
  </div>
  <div class="dash-body">
    <div class="dash-header">
      <div class="dash-title">המסמכים שלי</div>
      <button class="upload-btn" onclick="document.getElementById('file-input').click()">＋ העלה מסמך</button>
      <input type="file" id="file-input" accept=".pdf,.docx,.doc,.xlsx,.xls" onchange="handleUpload(event)">
    </div>
    <div class="section-label">ממתינים לחתימה</div>
    <div class="doc-list" id="pending-list"></div>
    <div class="section-label">חתומים</div>
    <div class="doc-list" id="completed-list"></div>
  </div>
</div>

<!-- VIEWER -->
<div id="viewer-screen" class="screen">
  <div class="viewer-topbar">
    <div class="vtop-left">
      <div class="vtop-brand">חתימה.</div>
      <div class="vtop-file" id="vtop-file">טוען…</div>
    </div>
    <div class="vtop-right">
      <button class="btn-back" onclick="backToDash()">← חזרה</button>
      <button class="btn-submit" id="submit-btn" onclick="submitSigned()" disabled>שלח מסמך חתום</button>
    </div>
  </div>
  <div class="viewer-body" id="viewer-body"></div>
</div>

<!-- SUCCESS -->
<div id="success-screen" class="screen">
  <div class="success-icon">✓</div>
  <h2>המסמך נחתם!</h2>
  <p>המסמך החתום נשלח לכל הצדדים הרלוונטיים.</p>
  <button class="btn-download" onclick="downloadSigned()">↓ הורד עותק חתום</button>
  <button class="btn-ghost2" onclick="backToDash()" style="margin-top:8px">← חזרה לרשימה</button>
</div>

<!-- ERROR -->
<div id="error-screen" class="screen">
  <div style="font-size:52px">⚠</div>
  <h2>שגיאה</h2>
  <p id="err-msg">אירעה שגיאה בלתי צפויה.</p>
  <button class="btn-ghost2" onclick="backToDash()" style="margin-top:8px">← חזרה לרשימה</button>
</div>

<script>
/* ══════════════════════════════════════════
   CONFIGURATION
══════════════════════════════════════════ */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyIMVK7wYHNsAIvbncKoiImrwLhKEzwkXV7vhG3YNom-x4xYwzCwcXtIiNUfs8GgZYI/exec';

const CREDENTIALS = {
  'signer': { password: 'sign123', email: 'signer@gmail.com' },
  'admin':  { password: 'admin456', email: 'admin@gmail.com' }
};
/* ══════════════════════════════════════════ */

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// State
let currentUser     = null;
let docBytes        = null;
let signedBytes     = null;
let currentToken    = null;
let currentFileName = '';
let currentFileType = '';
let urlToken        = null;
let hasSig          = false;
let drawing         = false;
let lx = 0, ly = 0;

window.addEventListener('load', () => {
  urlToken = new URLSearchParams(location.search).get('token');
  show('login-screen');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && isActive('login-screen')) doLogin();
});

/* ══════════════════════════════════════════
   LOGIN
══════════════════════════════════════════ */
function doLogin() {
  const u    = document.getElementById('username').value.trim();
  const p    = document.getElementById('password').value;
  const cred = CREDENTIALS[u];
  if (cred && cred.password === p) {
    document.getElementById('login-err').style.display = 'none';
    currentUser = { username: u, email: cred.email };
    if (urlToken) openByToken(urlToken);
    else loadDashboard();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

/* ══════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════ */
async function loadDashboard() {
  setLoading('טוען מסמכים…');
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=list&email=${enc(currentUser.email)}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    document.getElementById('topbar-user').textContent = currentUser.email;
    buildDashboard(data.documents || []);
    show('dashboard-screen');
  } catch (e) {
    showErr('לא ניתן לטעון את הרשימה: ' + e.message);
  }
}

function buildDashboard(docs) {
  const pending   = docs.filter(d => d.status === 'pending');
  const completed = docs.filter(d => d.status === 'completed');
  const pEl = document.getElementById('pending-list');
  const cEl = document.getElementById('completed-list');
  pEl.innerHTML = pending.length   ? '' : '<div class="empty">אין מסמכים הממתינים לחתימה</div>';
  cEl.innerHTML = completed.length ? '' : '<div class="empty">אין מסמכים חתומים עדיין</div>';
  pending.forEach(d   => pEl.appendChild(makeCard(d)));
  completed.forEach(d => cEl.appendChild(makeCard(d)));
}

function makeCard(doc) {
  const ext   = (doc.fileName.split('.').pop() || '').toLowerCase();
  const icons = { pdf:'📄', docx:'📝', doc:'📝', xlsx:'📊', xls:'📊' };
  const cls   = ext==='pdf' ? 'pdf' : (ext==='docx'||ext==='doc') ? 'docx' : (ext==='xlsx'||ext==='xls') ? 'xlsx' : 'other';
  const card  = document.createElement('div');
  card.className = `doc-card${doc.status === 'pending' ? ' clickable' : ''}`;
  card.innerHTML = `
    <div class="doc-left">
      <div class="doc-icon ${cls}">${icons[ext] || '📎'}</div>
      <div>
        <div class="doc-name">${doc.fileName}</div>
        <div class="doc-date">${doc.createdAt ? fmtDate(doc.createdAt) : ''}</div>
      </div>
    </div>
    <div class="badge ${doc.status}">${doc.status === 'pending' ? 'ממתין' : 'חתום ✓'}</div>
  `;
  if (doc.status === 'pending') card.onclick = () => openByToken(doc.token);
  return card;
}

function backToDash() {
  docBytes = null; signedBytes = null; currentToken = null;
  document.getElementById('viewer-body').innerHTML = '';
  hasSig = false; drawing = false;
  const btn = document.getElementById('submit-btn');
  btn.textContent   = 'שלח מסמך חתום';
  btn.disabled      = true;
  btn.style.display = '';
  loadDashboard();
}

/* ══════════════════════════════════════════
   UPLOAD — from index(2).html: no-cors + FileReader + retry
══════════════════════════════════════════ */
async function handleUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  setLoading('מעלה מסמך…');

  try {
    const b64  = await fileToB64(file);
    const body = JSON.stringify({
      action:      'store',
      pdf:         b64,
      fileName:    file.name,
      signerEmail: currentUser.email,
      senderEmail: currentUser.email
    });

    // Retry up to 3× for Apps Script cold starts
    for (let attempt = 1; attempt <= 3; attempt++) {
      try {
        // text/plain avoids CORS preflight; no-cors since we can't read redirect response
        await fetch(APPS_SCRIPT_URL, {
          method:  'POST',
          mode:    'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body
        });
        break; // if no throw, assume success
      } catch (err) {
        if (attempt === 3) throw err;
        await sleep(2500);
      }
    }

    // Wait for Apps Script to finish writing
    await sleep(3000);
    e.target.value = '';
    await loadDashboard();
  } catch (err) {
    alert('שגיאה בהעלאה: ' + err.message);
    show('dashboard-screen');
  }
}

/* ══════════════════════════════════════════
   OPEN DOCUMENT
══════════════════════════════════════════ */
async function openByToken(token) {
  setLoading('טוען מסמך…');
  currentToken = token;
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=fetch&token=${enc(token)}`);
    const data = await res.json();

    if (data.error && data.error.toLowerCase().includes('already')) {
      document.getElementById('vtop-file').textContent = data.fileName || '';
      document.getElementById('viewer-body').innerHTML =
        `<div style="flex:1;display:flex;align-items:center;justify-content:center;background:#3a3a3a">
           <div class="already-signed" style="max-width:340px">✓ מסמך זה כבר נחתם</div>
         </div>`;
      document.getElementById('submit-btn').style.display = 'none';
      show('viewer-screen');
      return;
    }
    if (data.error) throw new Error(data.error);

    currentFileName = data.fileName || 'מסמך';
    currentFileType = currentFileName.split('.').pop().toLowerCase();
    document.getElementById('vtop-file').textContent = currentFileName;
    document.getElementById('submit-btn').style.display = '';
    document.getElementById('submit-btn').disabled    = true;
    document.getElementById('submit-btn').textContent = 'שלח מסמך חתום';

    const clean = data.pdf.replace(/\s/g, '');
    const chars = atob(clean);
    docBytes = new Uint8Array(chars.length);
    for (let i = 0; i < chars.length; i++) docBytes[i] = chars.charCodeAt(i);

    await buildViewer(docBytes, currentFileType);
    show('viewer-screen');
  } catch (err) {
    showErr('לא ניתן לטעון את המסמך: ' + err.message);
  }
}

/* ══════════════════════════════════════════
   BUILD VIEWER
══════════════════════════════════════════ */
async function buildViewer(bytes, type) {
  const body = document.getElementById('viewer-body');
  body.innerHTML = '';
  hasSig = false;

  if (type === 'pdf') {
    await buildPDFViewer(bytes, body);
  } else if (type === 'docx' || type === 'doc') {
    buildDocxViewer(bytes, body);
  } else if (type === 'xlsx' || type === 'xls') {
    buildXlsxViewer(bytes, body);
  } else {
    body.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;background:#3a3a3a;color:white;font-size:14px;padding:32px">תצוגה מקדימה אינה זמינה לסוג קובץ זה.</div>`;
    buildSidebar(body);
  }
}

async function buildPDFViewer(bytes, body) {
  const area = document.createElement('div');
  area.className = 'doc-area';
  body.appendChild(area);

  const pdf = await pdfjsLib.getDocument({ data: bytes.slice() }).promise;
  for (let p = 1; p <= pdf.numPages; p++) {
    const page     = await pdf.getPage(p);
    const viewport = page.getViewport({ scale: 1.5 });
    const wrap     = document.createElement('div');
    wrap.className = 'page-wrap';
    const canvas   = document.createElement('canvas');
    canvas.className = 'pdf-page';
    canvas.width  = viewport.width;
    canvas.height = viewport.height;
    wrap.appendChild(canvas);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    // Signature strip only on last page — from index.html.TXT
    if (p === pdf.numPages) wrap.appendChild(buildSigStrip());
    area.appendChild(wrap);
  }
}

function buildSigStrip() {
  const today = new Date().toLocaleDateString('he-IL');
  const strip = document.createElement('div');
  strip.className = 'sig-strip';
  // Layout from index.html.TXT: name right, signature center, date left
  strip.innerHTML = `
    <div class="strip-field">
      <div class="strip-line">
        <input class="strip-input" id="signer-name" placeholder="שם מלא" oninput="checkReady()">
      </div>
      <div class="strip-label">שם מלא</div>
    </div>
    <div class="strip-field">
      <div class="sig-canvas-wrap">
        <canvas id="sig-canvas" width="180" height="58"></canvas>
        <div class="sig-ghost" id="sig-ghost-main">חתום כאן</div>
      </div>
      <div class="strip-label">חתימה</div>
      <button class="clear-link" onclick="clearSig()">נקה</button>
    </div>
    <div class="strip-field">
      <div class="strip-line">
        <div class="strip-date-val">${today}</div>
      </div>
      <div class="strip-label">תאריך</div>
    </div>
  `;
  requestAnimationFrame(() => initSigCanvas('sig-canvas', 'sig-ghost-main'));
  return strip;
}

function buildDocxViewer(bytes, body) {
  const area = document.createElement('div');
  area.className = 'docx-area';
  body.appendChild(area);
  mammoth.convertToHtml({ arrayBuffer: bytes.buffer }).then(r => { area.innerHTML = r.value; });
  buildSidebar(body);
}

function buildXlsxViewer(bytes, body) {
  const area = document.createElement('div');
  area.className = 'xlsx-area';
  const wb = XLSX.read(bytes, { type: 'array' });
  area.innerHTML = XLSX.utils.sheet_to_html(wb.Sheets[wb.SheetNames[0]]);
  body.appendChild(area);
  buildSidebar(body);
}

function buildSidebar(body) {
  const today = new Date().toLocaleDateString('he-IL');
  const sb = document.createElement('div');
  sb.className = 'sign-sidebar';
  sb.innerHTML = `
    <div class="sidebar-title">חתימה על המסמך</div>
    <div class="sidebar-hr"></div>
    <div>
      <div class="sf-label">שם מלא *</div>
      <input class="sf-input" id="signer-name" placeholder="שם מלא" oninput="checkReady()">
    </div>
    <div>
      <div class="sf-label">תאריך</div>
      <input class="sf-input" value="${today}" readonly style="background:#fafafa;color:var(--ink-light)">
    </div>
    <div>
      <div class="sf-label">חתימה *</div>
      <div class="sf-canvas-wrap">
        <canvas id="sig-canvas-side" width="240" height="100"></canvas>
        <div class="sf-ghost" id="sig-ghost-side">חתום כאן</div>
      </div>
      <button class="clear-link" style="margin-top:6px" onclick="clearSig()">נקה חתימה</button>
    </div>
    <div class="legal">בשליחת מסמך זה אתה מאשר שקראת, הבנת וחתמת עליו אלקטרונית. חתימה זו מחייבת משפטית.</div>
  `;
  body.appendChild(sb);
  requestAnimationFrame(() => initSigCanvas('sig-canvas-side', 'sig-ghost-side'));
}

/* ══════════════════════════════════════════
   SIGNATURE CANVAS
══════════════════════════════════════════ */
function initSigCanvas(id, ghostId) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#111'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  const pt = ev => {
    const r = canvas.getBoundingClientRect(), s = ev.touches ? ev.touches[0] : ev;
    return {
      x: (s.clientX - r.left) * (canvas.width  / r.width),
      y: (s.clientY - r.top)  * (canvas.height / r.height)
    };
  };
  const down = ev => { ev.preventDefault(); drawing = true; const p = pt(ev); lx = p.x; ly = p.y; };
  const move = ev => {
    ev.preventDefault();
    if (!drawing) return;
    const p = pt(ev);
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(p.x, p.y); ctx.stroke();
    lx = p.x; ly = p.y;
  };
  const up = () => {
    if (!drawing) return;
    drawing = false; hasSig = true;
    const g = document.getElementById(ghostId);
    if (g) g.style.display = 'none';
    checkReady();
  };
  canvas.addEventListener('mousedown',  down);
  canvas.addEventListener('mousemove',  move);
  canvas.addEventListener('mouseup',    up);
  canvas.addEventListener('mouseleave', up);
  canvas.addEventListener('touchstart', down, { passive: false });
  canvas.addEventListener('touchmove',  move, { passive: false });
  canvas.addEventListener('touchend',   up);
}

function clearSig() {
  ['sig-canvas', 'sig-canvas-side'].forEach(id => {
    const c = document.getElementById(id);
    if (c) c.getContext('2d').clearRect(0, 0, c.width, c.height);
  });
  hasSig = false;
  ['sig-ghost-main', 'sig-ghost-side'].forEach(id => {
    const g = document.getElementById(id);
    if (g) g.style.display = 'flex';
  });
  checkReady();
}

function checkReady() {
  const nameEl = document.getElementById('signer-name');
  document.getElementById('submit-btn').disabled = !(nameEl && nameEl.value.trim() && hasSig);
}

/* ══════════════════════════════════════════
   SUBMIT — from index.html.TXT: no-cors, signs last page only
   Large file b64 from index(2).html: FileReader blobToB64
══════════════════════════════════════════ */
async function submitSigned() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'מעבד...';

  try {
    // PDFLib destructured here — guaranteed loaded, no ReferenceError
    const { PDFDocument, rgb, StandardFonts } = PDFLib;

    const nameEl     = document.getElementById('signer-name');
    const signerName = nameEl ? nameEl.value.trim() : '';
    const signerDate = new Date().toLocaleDateString('he-IL');

    const sigCanvas  = document.getElementById('sig-canvas') || document.getElementById('sig-canvas-side');
    const sigDataURL = sigCanvas.toDataURL('image/png');
    const sigB64     = sigDataURL.split(',')[1];
    const sigBytes   = Uint8Array.from(atob(sigB64), c => c.charCodeAt(0));

    let finalBytes;

    if (currentFileType === 'pdf') {
      const pdfDoc   = await PDFDocument.load(docBytes);
      const pages    = pdfDoc.getPages();
      const lastPage = pages[pages.length - 1];
      const font     = await pdfDoc.embedFont(StandardFonts.Helvetica);
      const sigImg   = await pdfDoc.embedPng(sigBytes);
      const { width } = lastPage.getSize();

      // Placement from index.html.TXT: name right, sig center, date left
      lastPage.drawImage(sigImg, {
        x: width / 2 - 60,
        y: 100,
        width: 120,
        height: 40
      });
      lastPage.drawText(`נחתם על ידי: ${signerName}`, {
        x: width - 280,
        y: 75,
        size: 11,
        font,
        color: rgb(0.1, 0.1, 0.1)
      });
      lastPage.drawText(`תאריך: ${signerDate}`, {
        x: 30,
        y: 75,
        size: 10,
        font,
        color: rgb(0.3, 0.3, 0.3)
      });
      lastPage.drawLine({ start: { x: 30, y: 70 }, end: { x: width - 30, y: 70 }, thickness: 0.75, color: rgb(0.7, 0.7, 0.7) });
      lastPage.drawText(`ID: ${currentToken}`, { x: 30, y: 55, size: 6, font, color: rgb(0.7, 0.7, 0.7) });

      finalBytes = await pdfDoc.save();
    } else {
      finalBytes = docBytes;
    }

    signedBytes = finalBytes;

    // Safe base64 for large files — FileReader from index(2).html
    const signedB64 = await blobToB64(new Blob([finalBytes]));

    // no-cors POST — from index.html.TXT and index(2).html
    await fetch(APPS_SCRIPT_URL, {
      method:  'POST',
      mode:    'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action:     'complete',
        token:      currentToken,
        signedPdf:  signedB64,
        signerName,
        signerDate,
        sigImage:   sigB64,
        fileName:   currentFileName
      })
    });

    await sleep(3000); // let Apps Script finish
    show('success-screen');

  } catch (err) {
    alert('שגיאה בשליחה: ' + err.message);
    btn.disabled = false; btn.textContent = 'שלח מסמך חתום';
  }
}

/* ══════════════════════════════════════════
   DOWNLOAD — from index(2).html: DOM-appended anchor
══════════════════════════════════════════ */
function downloadSigned() {
  if (!signedBytes || signedBytes.length === 0) { alert('אין קובץ להורדה'); return; }
  const mimes = {
    pdf:  'application/pdf',
    docx: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    doc:  'application/msword',
    xlsx: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    xls:  'application/vnd.ms-excel'
  };
  const mime = mimes[currentFileType] || 'application/octet-stream';
  const name = 'חתום_' + currentFileName;
  const blob = new Blob([signedBytes], { type: mime });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.style.display = 'none';
  a.href     = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
const SCREENS = ['loading-screen','login-screen','dashboard-screen','viewer-screen','success-screen','error-screen'];
function show(id)     { SCREENS.forEach(s => document.getElementById(s).classList.toggle('active', s === id)); }
function isActive(id) { return document.getElementById(id).classList.contains('active'); }
function setLoading(msg) { document.getElementById('loading-text').textContent = msg || 'טוען…'; show('loading-screen'); }
function showErr(msg)    { document.getElementById('err-msg').textContent = msg; show('error-screen'); }
function enc(s)          { return encodeURIComponent(s); }
function sleep(ms)       { return new Promise(r => setTimeout(r, ms)); }
function fmtDate(str)    { try { return new Date(str).toLocaleDateString('he-IL'); } catch { return str; } }

// Read File as base64 — FileReader, handles any size
function fileToB64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('File read failed'));
    r.readAsDataURL(file);
  });
}

// Read Blob as base64 — safe for large signed PDFs, from index(2).html
function blobToB64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Blob read failed'));
    r.readAsDataURL(blob);
  });
}
