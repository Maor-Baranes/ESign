<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פורטל חתימה על מסמכים</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- html2canvas: used to snapshot DOCX/XLSX rendered content for PDF embedding -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --ink:       #0f0f0f;
  --ink-light: #555;
  --border:    #e2e2e2;
  --bg:        #f7f6f3;
  --white:     #ffffff;
  --blue:      #1d4ed8;
  --blue-dark: #1e3a8a;
  --red:       #dc2626;
  --green:     #16a34a;
  --r:         10px;
  --sh:        0 2px 16px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; direction: rtl; }
.screen { display: none; }
.screen.active { display: flex; }

/* ── LOADING ── */
#loading-screen { flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .75s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--ink-light); }

/* ── LOGIN ── */
#login-screen { align-items: center; justify-content: center; min-height: 100vh; }
.login-wrap { width: 100%; max-width: 400px; padding: 24px; }
.login-logo { font-family: 'DM Serif Display', serif; font-size: 28px; margin-bottom: 6px; }
.login-logo span { color: var(--blue); }
.login-sub { font-size: 14px; color: var(--ink-light); margin-bottom: 36px; }
.card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 32px; box-shadow: var(--sh); }
.field { margin-bottom: 18px; }
.field label { display: block; font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 7px; }
.field input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--r); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); outline: none; transition: border-color .18s; direction: ltr; text-align: right; }
.field input:focus { border-color: var(--blue); }
.err { display: none; font-size: 13px; color: var(--red); margin-bottom: 14px; }
.btn-primary { width: 100%; padding: 13px; border: none; border-radius: var(--r); background: var(--ink); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
.btn-primary:hover { opacity: .9; }

/* ── DASHBOARD ── */
#dashboard-screen { flex-direction: column; min-height: 100vh; }
.topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar-brand { font-family: 'DM Serif Display', serif; font-size: 22px; }
.topbar-brand span { color: var(--blue); }
.topbar-user { font-size: 13px; color: var(--ink-light); }
.dash-body { max-width: 860px; width: 100%; margin: 0 auto; padding: 36px 24px; }
.dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
.dash-title { font-family: 'DM Serif Display', serif; font-size: 26px; }
.upload-btn { display: flex; align-items: center; gap: 8px; padding: 11px 20px; background: var(--blue); color: white; border: none; border-radius: var(--r); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
.upload-btn:hover { opacity: .88; }
#file-input { display: none; }
.section-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 10px; margin-top: 28px; }
.doc-list { display: flex; flex-direction: column; gap: 8px; }
.doc-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 12px; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; transition: border-color .18s, box-shadow .18s; }
.doc-card.clickable { cursor: pointer; }
.doc-card.clickable:hover { border-color: var(--blue); box-shadow: 0 2px 12px rgba(29,78,216,.08); }
.doc-left { display: flex; align-items: center; gap: 14px; }
.doc-icon { width: 42px; height: 42px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.doc-icon.pdf  { background: #fee2e2; }
.doc-icon.docx { background: #dbeafe; }
.doc-icon.xlsx { background: #dcfce7; }
.doc-icon.other{ background: #f3f4f6; }
.doc-name { font-size: 14px; font-weight: 600; }
.doc-date { font-size: 12px; color: var(--ink-light); margin-top: 2px; }
.badge { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; flex-shrink: 0; }
.badge.pending   { background: #fef9c3; color: #854d0e; }
.badge.completed { background: #dcfce7; color: #166534; }
.empty { background: var(--white); border: 1.5px dashed var(--border); border-radius: 12px; padding: 28px; text-align: center; color: var(--ink-light); font-size: 14px; }

/* ── VIEWER ── */
#viewer-screen { flex-direction: column; min-height: 100vh; }
.viewer-topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; }
.vtop-left { display: flex; flex-direction: column; gap: 2px; }
.vtop-brand { font-family: 'DM Serif Display', serif; font-size: 18px; }
.vtop-file { font-size: 12px; color: var(--ink-light); max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.vtop-right { display: flex; gap: 10px; align-items: center; }
.btn-back { background: none; border: 1.5px solid var(--border); border-radius: var(--r); padding: 9px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; color: var(--ink); }
.btn-back:hover { border-color: var(--ink); }
.btn-submit { padding: 10px 22px; background: var(--blue); color: var(--white); border: none; border-radius: var(--r); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.btn-submit:hover { background: var(--blue-dark); }
.btn-submit:disabled { opacity: .42; cursor: not-allowed; }
.viewer-body { display: flex; flex: 1; height: calc(100vh - 57px); overflow: hidden; }

/* PDF viewer */
.doc-area { flex: 1; overflow-y: auto; background: #3a3a3a; padding: 28px 20px; display: flex; flex-direction: column; align-items: center; }
.page-wrap { position: relative; margin-bottom: 20px; box-shadow: 0 6px 32px rgba(0,0,0,.4); }
canvas.pdf-page { display: block; max-width: 100%; background: white; }

/* Signature strip — appended to last PDF page */
.sig-strip {
  background: #fff;
  border-top: 2.5px solid #1d4ed8;
  width: 100%;
  padding: 18px 24px 14px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 12px;
  direction: rtl;
}
.strip-field { display: flex; flex-direction: column; align-items: center; flex: 1; }
.strip-line { width: 100%; border-bottom: 1.5px solid #333; margin-bottom: 5px; min-height: 80px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; }
.strip-label { font-size: 10px; color: #666; font-weight: 600; letter-spacing: .04em; }
.strip-input { border: none; outline: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); text-align: center; width: 100%; }
.strip-date-val { font-size: 12px; color: #555; text-align: center; }

/* Signature field — identical structure to name/date: underlined area, content at bottom */
.sig-field-line {
  width: 100%;
  border-bottom: 1.5px solid #333;
  margin-bottom: 5px;
  min-height: 80px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 6px;
  cursor: pointer;
  position: relative;
}
.sig-field-line:hover { background: rgba(29,78,216,.03); }
.sig-field-hint { font-size: 11px; color: #bbb; font-style: italic; pointer-events: none; }
.sig-field-img { max-width: 100%; max-height: 68px; display: block; pointer-events: none; }
.sig-field-edit { position: absolute; top: 6px; left: 6px; font-size: 9px; color: #1d4ed8; background: rgba(255,255,255,.9); padding: 1px 5px; border-radius: 3px; pointer-events: none; }

.clear-link { font-size: 10px; color: var(--ink-light); cursor: pointer; text-decoration: underline; background: none; border: none; font-family: 'DM Sans', sans-serif; }

/* ── SIGNATURE MODAL ── */
.sig-modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.55); z-index: 1000;
  align-items: center; justify-content: center;
}
.sig-modal-overlay.open { display: flex; }
.sig-modal {
  background: #fff; border-radius: 16px;
  width: min(600px, 96vw);
  box-shadow: 0 24px 60px rgba(0,0,0,.28);
  overflow: hidden;
  animation: modalIn .18s ease;
}
@keyframes modalIn { from { transform: scale(.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.sig-modal-header {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sig-modal-title { font-family: 'DM Serif Display',serif; font-size: 20px; }
.sig-modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #888; line-height: 1; padding: 2px 6px; border-radius: 6px; }
.sig-modal-close:hover { background: #f3f4f6; color: #333; }
.sig-modal-body { padding: 20px 22px; }
.sig-modal-canvas-wrap {
  position: relative;
  width: 100%; height: 200px;
  border: 1.5px solid #d1d5db;
  border-radius: 10px;
  background: #fafbff;
  overflow: hidden;
  cursor: crosshair;
}
#sig-canvas-modal {
  display: block; width: 100%; height: 200px;
  touch-action: none;
}
.sig-modal-ghost {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; pointer-events: none;
}
.sig-modal-ghost .ghost-line {
  width: 60%; height: 1px; background: #ddd;
  position: absolute; bottom: 52px;
}
.sig-modal-ghost .ghost-text { font-size: 13px; color: #bbb; margin-top: 12px; }
.sig-modal-hint { font-size: 11px; color: #aaa; margin-top: 8px; text-align: center; }
.sig-modal-footer {
  padding: 14px 22px 18px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
}
.sig-modal-left { display: flex; gap: 8px; }
.btn-modal-clear { padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 8px; background: none; font-family: 'DM Sans',sans-serif; font-size: 13px; cursor: pointer; color: var(--ink); }
.btn-modal-clear:hover { border-color: var(--red); color: var(--red); }
.btn-modal-cancel { padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 8px; background: none; font-family: 'DM Sans',sans-serif; font-size: 13px; cursor: pointer; color: var(--ink); }
.btn-modal-apply { padding: 9px 24px; background: var(--blue); color: white; border: none; border-radius: 8px; font-family: 'DM Sans',sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-modal-apply:disabled { opacity: .4; cursor: not-allowed; }
.btn-modal-apply:not(:disabled):hover { background: var(--blue-dark); }

/* Sig strip scroll hint */
.sig-strip-hint {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(29,78,216,.92);
  color: white;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  padding: 10px 22px;
  border-radius: 24px;
  cursor: pointer;
  z-index: 300;
  box-shadow: 0 4px 18px rgba(0,0,0,.25);
  gap: 8px;
  align-items: center;
}
.sig-strip-hint.visible { display: flex; }

/* DOCX / XLSX */
.docx-area { flex: 1; overflow-y: auto; background: white; padding: 48px 56px; font-size: 14px; line-height: 1.75; direction: ltr; text-align: left; }
.xlsx-area { flex: 1; overflow: auto; background: white; padding: 24px; }
.xlsx-area table { border-collapse: collapse; font-size: 13px; }
.xlsx-area td, .xlsx-area th { border: 1px solid #ddd; padding: 6px 12px; }
.xlsx-area th { background: #f3f4f6; font-weight: 600; }

/* Sidebar for non-PDF */
.sign-sidebar { width: 280px; background: var(--white); border-right: 1px solid var(--border); padding: 28px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }
.sidebar-title { font-family: 'DM Serif Display', serif; font-size: 18px; }
.sidebar-hr { height: 1px; background: var(--border); margin: 0 -20px; }
.sf-label { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 7px; }
.sf-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--r); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); outline: none; }
.sf-input:focus { border-color: var(--blue); }
.legal { font-size: 11px; color: #aaa; line-height: 1.6; border-top: 1px solid var(--border); padding-top: 14px; }
.already-signed { background: #dcfce7; color: #166534; border-radius: var(--r); padding: 14px; font-size: 13px; font-weight: 600; text-align: center; }

/* ── SUCCESS ── */
#success-screen { flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 32px; gap: 14px; }
.success-icon { width: 76px; height: 76px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 34px; }
#success-screen h2 { font-family: 'DM Serif Display', serif; font-size: 30px; }
#success-screen p  { font-size: 15px; color: var(--ink-light); max-width: 380px; line-height: 1.6; }
.btn-download { padding: 12px 28px; background: var(--green); color: white; border: none; border-radius: var(--r); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
.btn-download:hover { opacity: .88; }
.btn-ghost2 { padding: 10px 22px; background: none; border: 1.5px solid var(--border); border-radius: var(--r); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; color: var(--ink); }

/* ── ERROR ── */
#error-screen { flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 32px; gap: 12px; }
#error-screen h2 { font-family: 'DM Serif Display', serif; font-size: 26px; }
#error-screen p  { font-size: 14px; color: var(--ink-light); max-width: 380px; line-height: 1.6; }

@media (max-width: 680px) {
  .viewer-body { flex-direction: column; height: auto; }
  .sign-sidebar { width: 100%; border-right: none; border-top: 1px solid var(--border); }
  .doc-area { padding: 12px 8px; }
  .sig-strip { flex-direction: column; align-items: center; }
  .dash-body { padding: 20px 14px; }
}
</style>
</head>
<body>

<!-- SIGNATURE MODAL -->
<div class="sig-modal-overlay" id="sig-modal-overlay" onclick="handleModalOverlayClick(event)">
  <div class="sig-modal">
    <div class="sig-modal-header">
      <div class="sig-modal-title">חתימה מהירה</div>
      <button class="sig-modal-close" onclick="closeSigModal()">✕</button>
    </div>
    <div class="sig-modal-body">
      <div class="sig-modal-canvas-wrap" id="sig-modal-canvas-wrap">
        <canvas id="sig-canvas-modal"></canvas>
        <div class="sig-modal-ghost" id="sig-modal-ghost">
          <div class="ghost-line"></div>
          <div class="ghost-text">חתום כאן</div>
        </div>
      </div>
      <div class="sig-modal-hint">צייר את חתימתך בתוך המסגרת</div>
    </div>
    <div class="sig-modal-footer">
      <div class="sig-modal-left">
        <button class="btn-modal-clear" onclick="clearModalCanvas()">נקה</button>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn-modal-cancel" onclick="closeSigModal()">ביטול</button>
        <button class="btn-modal-apply" id="btn-modal-apply" onclick="applySig()" disabled>אישור ✓</button>
      </div>
    </div>
  </div>
</div>

<!-- LOADING -->
<div id="loading-screen" class="screen">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">טוען…</div>
</div>

<!-- LOGIN -->
<div id="login-screen" class="screen">
  <div class="login-wrap">
    <div class="login-logo"><span>חתימה מהירה.</span></div>
    <div class="login-sub">מערכת חתימה אלקטרונית מאובטחת</div>
    <div class="card">
      <div class="field">
        <label>שם משתמש</label>
        <input type="text" id="username" placeholder="הזן שם משתמש" autocomplete="off">
      </div>
      <div class="field">
        <label>סיסמה</label>
        <input type="password" id="password" placeholder="הזן סיסמה">
      </div>
      <div class="err" id="login-err">שם משתמש או סיסמה שגויים</div>
      <button class="btn-primary" onclick="doLogin()">כניסה ←</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen" class="screen">
  <div class="topbar">
    <div class="topbar-brand">חתימה<span>.</span></div>
    <div class="topbar-user" id="topbar-user"></div>
  </div>
  <div class="dash-body">
    <div class="dash-header">
      <div class="dash-title">המסמכים שלי</div>
      <button class="upload-btn" onclick="document.getElementById('file-input').click()">＋ העלה מסמך</button>
      <input type="file" id="file-input" accept=".pdf,.docx,.doc,.xlsx,.xls" onchange="handleUpload(event)">
    </div>
    <div class="section-label">ממתינים לחתימה</div>
    <div class="doc-list" id="pending-list"></div>
    <div class="section-label">חתומים</div>
    <div class="doc-list" id="completed-list"></div>
  </div>
</div>

<!-- VIEWER -->
<div id="viewer-screen" class="screen">
  <div class="viewer-topbar">
    <div class="vtop-left">
      <div class="vtop-brand">חתימה.</div>
      <div class="vtop-file" id="vtop-file">טוען…</div>
    </div>
    <div class="vtop-right">
      <button class="btn-back" onclick="backToDash()">← חזרה</button>
      <button class="btn-submit" id="submit-btn" onclick="submitSigned()" disabled>שלח מסמך חתום</button>
    </div>
  </div>
  <div class="viewer-body" id="viewer-body"></div>
  <!-- floating hint for PDF — scrolls to sig strip -->
  <div class="sig-strip-hint" id="sig-strip-hint" onclick="scrollToSigStrip()">
    ✍️ גלול לחתימה
  </div>
</div>

<!-- SUCCESS -->
<div id="success-screen" class="screen">
  <div class="success-icon">✓</div>
  <h2>המסמך נחתם!</h2>
  <p id="success-msg">המסמך החתום נשלח לכל הצדדים הרלוונטיים.</p>
  <button class="btn-download" onclick="downloadSigned()">↓ הורד עותק חתום</button>
  <button class="btn-ghost2" onclick="backToDash()" style="margin-top:8px">← חזרה לרשימה</button>
</div>

<!-- ERROR -->
<div id="error-screen" class="screen">
  <div style="font-size:52px">⚠</div>
  <h2>שגיאה</h2>
  <p id="err-msg">אירעה שגיאה בלתי צפויה.</p>
  <button class="btn-ghost2" onclick="backToDash()" style="margin-top:8px">← חזרה לרשימה</button>
</div>

<script>
/* ══════════════════════════════════════════
   CONFIGURATION  — replace YOUR_DEPLOYMENT_ID
══════════════════════════════════════════ */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyIMVK7wYHNsAIvbncKoiImrwLhKEzwkXV7vhG3YNom-x4xYwzCwcXtIiNUfs8GgZYI/exec';

const CREDENTIALS = {
  'signer': { password: 'sign123', email: 'signer@gmail.com' },
  'admin':  { password: 'admin456', email: 'admin@gmail.com' }
};
/* ══════════════════════════════════════════ */

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ──────────────────────────────────
let currentUser     = null;
let docBytes        = null;   // original file bytes (Uint8Array)
let signedBytes     = null;   // signed file bytes  (Uint8Array / ArrayBuffer)
let currentToken    = null;
let currentFileName = '';
let currentFileType = '';     // 'pdf' | 'docx' | 'doc' | 'xlsx' | 'xls'
let urlToken        = null;
let hasSig          = false;
let drawing         = false;
let lx = 0, ly = 0;
let sigStripEl      = null;   // reference to the PDF sig strip DOM node

window.addEventListener('load', () => {
  urlToken = new URLSearchParams(location.search).get('token');
  show('login-screen');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && isActive('login-screen')) doLogin();
});

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
const SCREENS = ['loading-screen','login-screen','dashboard-screen','viewer-screen','success-screen','error-screen'];
function show(id)     {
  SCREENS.forEach(s => document.getElementById(s).classList.toggle('active', s === id));
  // Hide the PDF hint whenever we leave the viewer
  if (id !== 'viewer-screen') {
    const hint = document.getElementById('sig-strip-hint');
    if (hint) hint.classList.remove('visible');
  }
}
function isActive(id) { return document.getElementById(id).classList.contains('active'); }
function setLoading(msg) { document.getElementById('loading-text').textContent = msg || 'טוען…'; show('loading-screen'); }
function showErr(msg)    { document.getElementById('err-msg').textContent = msg; show('error-screen'); }
function enc(s)          { return encodeURIComponent(s); }
function sleep(ms)       { return new Promise(r => setTimeout(r, ms)); }
function fmtDate(str)    { try { return new Date(str).toLocaleDateString('he-IL'); } catch { return str; } }

/**
 * fetch with an AbortController timeout so we never hang forever.
 * Default: 30 seconds.
 */
function fetchWithTimeout(url, options = {}, timeoutMs = 30000) {
  const ctrl = new AbortController();
  const id   = setTimeout(() => ctrl.abort(), timeoutMs);
  return fetch(url, { ...options, signal: ctrl.signal })
    .finally(() => clearTimeout(id));
}

/** Read a File object as base64 string (no data-URL prefix). */
function fileToB64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('File read failed'));
    r.readAsDataURL(file);
  });
}

/** Read a Blob as base64 — safe for large signed PDFs. */
function blobToB64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Blob read failed'));
    r.readAsDataURL(blob);
  });
}

function buildDashboard(docs) {
  const pending   = docs.filter(d => d.status === 'pending');

  const cEl = document.getElementById('completed-list');

  cEl.innerHTML = completed.length ? '' : '<div class="empty">אין מסמכים חתומים עדיין</div>';
  pending.forEach(d   => pEl.appendChild(makeCard(d)));
  completed.forEach(d => cEl.appendChild(makeCard(d)));

function makeCard(doc) {

  const icons = { pdf:'📄', docx:'📝', doc:'📝', xlsx:'📊', xls:'📊' };

/* ══════════════════════════════════════════
   UPLOAD
   FIX 1: Removed mode:'no-cors' so the response is readable.
   Content-Type: text/plain = simple request, no preflight needed.
   GAS web apps deployed "Anyone" return Access-Control-Allow-Origin: *.
   After storing, we get the token back and navigate directly to signing.
══════════════════════════════════════════ */
async function handleUpload(e) {
  const file = e.target.files[0];
  if (!file) return;

  // Validate file type before sending
  const allowed = ['pdf', 'docx', 'doc', 'xlsx', 'xls'];
  const ext = file.name.split('.').pop().toLowerCase();
  if (!allowed.includes(ext)) {
    alert('סוג קובץ לא נתמך. יש להעלות PDF, DOCX, DOC, XLSX, או XLS.');
    e.target.value = '';
    return;
  }

  setLoading('מעלה מסמך…');

  try {
    const b64  = await fileToB64(file);
    const body = JSON.stringify({
      action:      'store',
      pdf:         b64,
      fileName:    file.name,
      signerEmail: currentUser.email,
      senderEmail: currentUser.email
    });

    let token = null;

    for (let attempt = 1; attempt <= 3; attempt++) {
      try {
        // No mode:'no-cors' → response is readable → we can get the token
        const res  = await fetchWithTimeout(APPS_SCRIPT_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'text/plain' },
          body
        }, 30000);

        let data = {};
        try { data = await res.json(); } catch (_) { /* non-JSON fallback */ }

        if (data.token) { token = data.token; break; }
        if (data.error) throw new Error(data.error);

        // No token and no error: GAS might still be cold-starting
        if (attempt < 3) { await sleep(3000); continue; }

        // Final attempt: fall back to dashboard reload
        await sleep(2000);
        e.target.value = '';
        await loadDashboard();
        return;

      } catch (err) {
        if (err.name === 'AbortError') throw new Error('Request timed out — please try again');
        if (attempt === 3) throw err;
        await sleep(3000);
      }
    }

    e.target.value = '';

    if (token) {
      // Navigate straight to the signing interface — no dashboard detour
      await openByToken(token);
    } else {
      await loadDashboard();
    }

  } catch (err) {
    console.error('Upload error:', err);
    alert('שגיאה בהעלאה: ' + err.message);
    e.target.value = '';
    show('dashboard-screen');
    loadDashboard().catch(console.error);
  }
}

/* ══════════════════════════════════════════
   OPEN DOCUMENT BY TOKEN
══════════════════════════════════════════ */
async function openByToken(token) {
  setLoading('טוען מסמך…');
  currentToken = token;

  try {
    const res  = await fetchWithTimeout(
      `${APPS_SCRIPT_URL}?action=fetch&token=${enc(token)}`
    );
    const data = await res.json();

    if (data.error && data.error.toLowerCase().includes('already')) {
      document.getElementById('vtop-file').textContent = data.fileName || '';
      document.getElementById('viewer-body').innerHTML =
        `<div style="flex:1;display:flex;align-items:center;justify-content:center;background:#3a3a3a">
           <div class="already-signed" style="max-width:340px">✓ מסמך זה כבר נחתם</div>
         </div>`;
      document.getElementById('submit-btn').style.display = 'none';
      show('viewer-screen');
      return;
    }
    if (data.error) throw new Error(data.error);

    currentFileName = data.fileName || 'מסמך';
    currentFileType = currentFileName.split('.').pop().toLowerCase();
    document.getElementById('vtop-file').textContent = currentFileName;
    document.getElementById('submit-btn').style.display = '';
    document.getElementById('submit-btn').disabled    = true;
    document.getElementById('submit-btn').textContent = 'שלח מסמך חתום';

    // Decode base64 file bytes
    const clean = data.pdf.replace(/\s/g, '');
    const chars = atob(clean);
    docBytes = new Uint8Array(chars.length);
    for (let i = 0; i < chars.length; i++) docBytes[i] = chars.charCodeAt(i);

    await buildViewer(docBytes, currentFileType);
    show('viewer-screen');

  } catch (err) {
    showErr('לא ניתן לטעון את המסמך: ' + err.message);
  }
}

/* ══════════════════════════════════════════
   BUILD VIEWER (dispatcher)
══════════════════════════════════════════ */
async function buildViewer(bytes, type) {
  const body = document.getElementById('viewer-body');
  body.innerHTML = '';
  hasSig     = false;
  sigStripEl = null;
  drawing    = false;

  const norm = type.toLowerCase();

  if (norm === 'pdf') {
    await buildPDFViewer(bytes, body);
  } else if (norm === 'docx' || norm === 'doc') {
    await buildDocxViewer(bytes, body);
  } else if (norm === 'xlsx' || norm === 'xls') {
    buildXlsxViewer(bytes, body);
  } else {
    body.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;background:#3a3a3a;color:white;font-size:14px;padding:32px">תצוגה מקדימה אינה זמינה לסוג קובץ זה.</div>`;
    buildSidebar(body);
  }
}

/* ══════════════════════════════════════════
   PDF VIEWER
   FIX 2a: Use setTimeout(100) instead of requestAnimationFrame for
            canvas init — rAF can fire before the strip is in the live DOM.
   FIX 2b: After render, auto-scroll the sig strip into view and show
            the floating hint button so users always see it.
══════════════════════════════════════════ */
async function buildPDFViewer(bytes, body) {
  const area = document.createElement('div');
  area.className = 'doc-area';
  body.appendChild(area);

  const pdf = await pdfjsLib.getDocument({ data: bytes.slice() }).promise;

  for (let p = 1; p <= pdf.numPages; p++) {
    const page     = await pdf.getPage(p);
    const viewport = page.getViewport({ scale: 1.5 });
    const wrap     = document.createElement('div');
    wrap.className = 'page-wrap';

    const canvas         = document.createElement('canvas');
    canvas.className     = 'pdf-page';
    canvas.width         = viewport.width;
    canvas.height        = viewport.height;
    wrap.appendChild(canvas);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

    if (p === pdf.numPages) {
      const strip = buildSigStrip();
      wrap.appendChild(strip);
      sigStripEl = strip;
    }
    area.appendChild(wrap);
  }

  // Scroll to signature strip and show hint after a brief delay
  if (sigStripEl) {
    setTimeout(() => {
      sigStripEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 600);

    // Also show a floating hint button in case the user scrolls away
    const hint = document.getElementById('sig-strip-hint');
    hint.classList.add('visible');
  }
}

function scrollToSigStrip() {

/* ══════════════════════════════════════════
   SIGNATURE MODAL
══════════════════════════════════════════ */
let modalDrawing = false, mlx = 0, mly = 0;
let modalHasSig  = false;
let sigDataUrl   = null;   // the final committed sig as data URL

function openSigModal() {
  const overlay = document.getElementById('sig-modal-overlay');
  overlay.classList.add('open');

  // Size the canvas to the wrap's actual pixel size
  const wrap   = document.getElementById('sig-modal-canvas-wrap');
  const canvas = document.getElementById('sig-canvas-modal');
  canvas.width  = wrap.offsetWidth  || 556;
  canvas.height = wrap.offsetHeight || 200;

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // If there's an existing sig, pre-draw it
  if (sigDataUrl) {
    const img = new Image();
    img.onload = () => { ctx.drawImage(img, 0, 0, canvas.width, canvas.height); };
    img.src = sigDataUrl;
    modalHasSig = true;
  } else {
    modalHasSig = false;
  }

  document.getElementById('sig-modal-ghost').style.display = modalHasSig ? 'none' : 'flex';
  document.getElementById('btn-modal-apply').disabled = !modalHasSig;

  initModalCanvas();
  document.body.style.overflow = 'hidden';
}

function closeSigModal() {
  document.getElementById('sig-modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  modalDrawing = false;
}

function handleModalOverlayClick(e) {
  if (e.target === document.getElementById('sig-modal-overlay')) closeSigModal();
}

function initModalCanvas() {
  const canvas = document.getElementById('sig-canvas-modal');
  const ctx    = canvas.getContext('2d');
  ctx.strokeStyle = '#111';
  ctx.lineWidth   = 1.8;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  // Remove old listeners by cloning
  const fresh = canvas.cloneNode(true);
  canvas.parentNode.replaceChild(fresh, canvas);
  const c = document.getElementById('sig-canvas-modal');
  const cx = c.getContext('2d');
  cx.strokeStyle = '#111'; cx.lineWidth = 1.8; cx.lineCap = 'round'; cx.lineJoin = 'round';

  // Redraw existing if any
  if (sigDataUrl) {
    const img = new Image();
    img.onload = () => cx.drawImage(img, 0, 0, c.width, c.height);
    img.src = sigDataUrl;
  }

  const pt = ev => {
    const r = c.getBoundingClientRect(), s = ev.touches ? ev.touches[0] : ev;
    return { x: (s.clientX - r.left) * (c.width / r.width), y: (s.clientY - r.top) * (c.height / r.height) };
  };
  const down = ev => { ev.preventDefault(); modalDrawing = true; const p = pt(ev); mlx = p.x; mly = p.y; };
  const move = ev => {
    ev.preventDefault();
    if (!modalDrawing) return;
    const p = pt(ev);
    cx.beginPath(); cx.moveTo(mlx, mly); cx.lineTo(p.x, p.y); cx.stroke();
    mlx = p.x; mly = p.y;
  };
  const up = () => {
    if (!modalDrawing) return;
    modalDrawing = false; modalHasSig = true;
    document.getElementById('sig-modal-ghost').style.display = 'none';
    document.getElementById('btn-modal-apply').disabled = false;
  };

  c.addEventListener('mousedown',  down);
  c.addEventListener('mousemove',  move);
  c.addEventListener('mouseup',    up);
  c.addEventListener('mouseleave', up);
  c.addEventListener('touchstart', down, { passive: false });
  c.addEventListener('touchmove',  move, { passive: false });
  c.addEventListener('touchend',   up);
}

function clearModalCanvas() {
  const c = document.getElementById('sig-canvas-modal');
  c.getContext('2d').clearRect(0, 0, c.width, c.height);
  modalHasSig = false;
  document.getElementById('sig-modal-ghost').style.display = 'flex';
  document.getElementById('btn-modal-apply').disabled = true;
}

function applySig() {
  const c = document.getElementById('sig-canvas-modal');
  sigDataUrl = c.toDataURL('image/png');
  hasSig     = true;

  const area = document.getElementById('sig-display-area');
  if (area) {
    area.innerHTML = `<img class="sig-field-img" src="${sigDataUrl}"><div class="sig-field-edit">ערוך</div>`;
  }

  closeSigModal();
  checkReady();
}

function clearSig() {
  sigDataUrl  = null;
  hasSig      = false;
  modalHasSig = false;

  const area = document.getElementById('sig-display-area');
  if (area) {
    area.innerHTML = `<span class="sig-field-hint">✍ חתום כאן</span>`;
  }
  checkReady();
}

function checkReady() {
  const nameEl = document.getElementById('signer-name');
  document.getElementById('submit-btn').disabled = !(nameEl && nameEl.value.trim() && hasSig);
}

/* ══════════════════════════════════════════
   TEXT → PNG IMAGE HELPER
   Renders any Unicode / Hebrew / RTL text via a browser canvas and returns
   a Uint8Array PNG. Used everywhere PDFLib's WinAnsi drawText would crash.
══════════════════════════════════════════ */
function textToImagePng(text, {
  fontSize   = 14,
  fontFamily = 'DM Sans, Arial, sans-serif',
  color      = '#111111',
  bold       = false,
  direction  = 'rtl',   // 'rtl' for Hebrew, 'ltr' otherwise
  padding    = 6,
  maxWidth   = 400
} = {}) {
  // Measure first
  const measure = document.createElement('canvas');
  const mctx    = measure.getContext('2d');
  mctx.font     = `${bold ? '700' : '400'} ${fontSize}px ${fontFamily}`;
  const tw      = Math.min(mctx.measureText(text).width, maxWidth) + padding * 2;
  const th      = fontSize * 1.5 + padding * 2;

  const c   = document.createElement('canvas');
  c.width   = Math.ceil(tw);
  c.height  = Math.ceil(th);
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.font      = `${bold ? '700' : '400'} ${fontSize}px ${fontFamily}`;
  ctx.fillStyle = color;
  ctx.direction = direction;
  ctx.textAlign = direction === 'rtl' ? 'right' : 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, direction === 'rtl' ? c.width - padding : padding, c.height / 2, maxWidth);

  const dataUrl = c.toDataURL('image/png');
  const b64     = dataUrl.split(',')[1];
  return Uint8Array.from(atob(b64), ch => ch.charCodeAt(0));
}

/* ══════════════════════════════════════════
   SUBMIT SIGNED DOCUMENT
   FIX 3a – PDF: signedBytes is set BEFORE any awaited backend call.
   FIX 3b – DOCX/XLSX: html2canvas captures the rendered content area;
             PDFLib assembles a multi-page signed PDF (content pages + sig page).
   FIX 4  – Backend call is fire-and-forget with timeout.
             Success screen shows immediately after local signing — we never
             get "stuck" waiting for GAS to respond.
══════════════════════════════════════════ */
async function submitSigned() {
  const btn = document.getElementById('submit-btn');
  btn.disabled    = true;
  btn.textContent = 'מייצר מסמך חתום...';

  try {
    const { PDFDocument, rgb, StandardFonts } = PDFLib;

    const nameEl     = document.getElementById('signer-name');
    const signerName = nameEl ? nameEl.value.trim() : '';
    const signerDate = new Date().toLocaleDateString('he-IL');

    if (!sigDataUrl) throw new Error('No signature found');
    const currentSigDataUrl = sigDataUrl;

    let finalBytes;
    let signedFileName;

    // ── PDF: embed signature directly ─────────────────────────
    if (currentFileType === 'pdf') {
      const pdfDoc   = await PDFDocument.load(docBytes, { ignoreEncryption: true });
      const pages    = pdfDoc.getPages();
      const lastPage = pages[pages.length - 1];
      const { width } = lastPage.getSize();

      // Render the sig strip exactly as it appears in the viewer — filled in
      const stripPngBytes = await renderSigStripToImage(signerName, currentSigDataUrl, signerDate);
      const stripImg      = await pdfDoc.embedPng(stripPngBytes);
      const stripAspect   = stripImg.height / stripImg.width;
      const stripH        = Math.round(width * stripAspect);
      lastPage.drawImage(stripImg, { x: 0, y: 0, width, height: stripH });

      finalBytes     = await pdfDoc.save();
      signedFileName = 'חתום_' + currentFileName;

    // ── DOCX / XLSX: snapshot rendered content → signed PDF ───
    } else {
      btn.textContent = 'מעבד תוכן...';

      const contentArea = document.querySelector('.docx-area') || document.querySelector('.xlsx-area');
      if (!contentArea) throw new Error('Content area not found');

      finalBytes     = await buildSignedPdfFromContent(contentArea, currentSigDataUrl, signerName, signerDate, currentToken, currentFileName);
      signedFileName = currentFileName.replace(/\.[^.]+$/, '') + '_חתום.pdf';
    }

    // ── Store signed bytes IMMEDIATELY (before any async backend work) ──
    signedBytes = finalBytes;

    btn.textContent = 'שולח...';

    // Get signature image for backend record
    const sigB64    = currentSigDataUrl.split(',')[1];
    const signedB64 = await blobToB64(new Blob([finalBytes]));

    // Fire-and-forget backend call — success screen does NOT wait for this.
    // The local PDF is already signed; GAS call is for record-keeping + email.
    fetchWithTimeout(APPS_SCRIPT_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action:     'complete',
        token:      currentToken,
        signedPdf:  signedB64,
        signerName,
        signerDate,
        sigImage:   sigB64,
        fileName:   signedFileName
      })
    }, 45000).catch(err => console.warn('Backend notification failed (non-blocking):', err));

    // Navigate to success immediately — the signed PDF is ready to download
    document.getElementById('success-msg').textContent =
      'המסמך החתום מוכן להורדה. עדכון הרשימה עשוי לקחת מספר שניות.';
    show('success-screen');

  } catch (err) {
    console.error('Submit error:', err);
    alert('שגיאה בשליחה: ' + err.message);
    btn.disabled    = false;
    btn.textContent = 'שלח מסמך חתום';
  }
}

/* ══════════════════════════════════════════
   RENDER SIG STRIP TO IMAGE
   Builds an off-screen div that looks exactly like the signed sig strip
   (filled in with name, drawn signature, and date), snapshots it with
   html2canvas, and returns PNG bytes. Works for any Unicode / Hebrew text
   because the browser canvas handles all scripts natively.
══════════════════════════════════════════ */
async function renderSigStripToImage(signerName, sigDataUrlArg, signerDate) {
  const S      = 2;
  const W      = 700 * S;
  const PAD    = 28 * S;
  const FIELD_W = Math.floor((W - PAD * 2 - 32 * S) / 3);
  const SIG_W   = 200 * S;
  const ROW_H   = 80 * S;
  const LABEL_H = 22 * S;
  const TOP_PAD = 18 * S;
  const BOT_PAD = 16 * S;
  const H = TOP_PAD + ROW_H + 6 * S + LABEL_H + BOT_PAD + 4 * S;

  const c   = document.createElement('canvas');
  c.width   = W;
  c.height  = H;
  const ctx = c.getContext('2d');

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#1d4ed8';
  ctx.fillRect(0, 0, W, 3 * S);

  const font = 'Arial, sans-serif';

  function drawField(x, w, valueText, label, imgEl) {
    const lineY  = TOP_PAD + ROW_H;
    const labelY = lineY + 8 * S;
    ctx.strokeStyle = '#333333';
    ctx.lineWidth   = 1.5 * S;
    ctx.beginPath(); ctx.moveTo(x, lineY); ctx.lineTo(x + w, lineY); ctx.stroke();
    if (imgEl) {
      const ih = Math.min(ROW_H - 4 * S, imgEl.height * (w / imgEl.width));
      const iw = imgEl.width * (ih / imgEl.height);
      ctx.drawImage(imgEl, x + (w - iw) / 2, TOP_PAD + (ROW_H - ih) / 2, iw, ih);
    } else {
      ctx.font = `${14 * S}px ${font}`;
      ctx.fillStyle = '#111111';
      ctx.textBaseline = 'bottom';
      ctx.textAlign = 'center';
      ctx.direction = 'rtl';
      ctx.fillText(valueText, x + w / 2, lineY - 5 * S, w - 8 * S);
    }
    ctx.font = `600 ${9 * S}px ${font}`;
    ctx.fillStyle = '#666666';
    ctx.textBaseline = 'top';
    ctx.textAlign = 'center';
    ctx.direction = 'ltr';
    ctx.fillText(label, x + w / 2, labelY);
  }

  const col1x = PAD;
  const col2x = PAD + FIELD_W + 16 * S;
  const col3x = PAD + FIELD_W + 16 * S + SIG_W + 16 * S;

  const sigImg = new Image();
  await new Promise(res => { sigImg.onload = res; sigImg.src = sigDataUrlArg; });

  drawField(col1x, FIELD_W, signerDate, 'תאריך',   null);
  drawField(col2x, SIG_W,   '',         'חתימה',   sigImg);
  drawField(col3x, FIELD_W, signerName, 'שם מלא', null);

  const dataUrl = c.toDataURL('image/png');
  return Uint8Array.from(atob(dataUrl.split(',')[1]), ch => ch.charCodeAt(0));
}

/* ══════════════════════════════════════════
   BUILD SIGNED PDF FROM DOCX / XLSX CONTENT
   Snapshots the rendered HTML into A4 pages, then appends the sig strip
   (identical to the viewer UI) at the bottom of the last content page.
══════════════════════════════════════════ */
async function buildSignedPdfFromContent(contentEl, sigDataUrlArg, signerName, signerDate, token, fileName) {
  const { PDFDocument, rgb, StandardFonts } = PDFLib;

  // Un-constrain so html2canvas captures the full document height
  const saved = {
    height:    contentEl.style.height,
    maxHeight: contentEl.style.maxHeight,
    overflow:  contentEl.style.overflow,
    overflowY: contentEl.style.overflowY
  };
  contentEl.style.height    = 'auto';
  contentEl.style.maxHeight = 'none';
  contentEl.style.overflow  = 'visible';
  contentEl.style.overflowY = 'visible';
  await sleep(250);

  const fullCanvas = await html2canvas(contentEl, {
    scale:           1.5,
    useCORS:         false,
    allowTaint:      true,
    backgroundColor: '#ffffff',
    logging:         false,
    onclone: (clonedDoc) => {
      // Strip any external stylesheet/font links so html2canvas makes no network requests
      clonedDoc.querySelectorAll('link[rel="stylesheet"], link[rel="preload"]').forEach(el => el.remove());
      clonedDoc.querySelectorAll('style').forEach(el => {
        // Remove @import and url() font references
        el.textContent = el.textContent
          .replace(/@import[^;]+;/g, '')
          .replace(/url\(['"]?https?:\/\/[^'"')]+['"]?\)/g, 'none');
      });
    }
  });

  contentEl.style.height    = saved.height;
  contentEl.style.maxHeight = saved.maxHeight;
  contentEl.style.overflow  = saved.overflow;
  contentEl.style.overflowY = saved.overflowY;

  // Render the sig strip image (same as PDF viewer UI, filled in)
  const stripPngBytes = await renderSigStripToImage(signerName, sigDataUrlArg, signerDate);

  // A4 dimensions in PDF points
  const A4_W = 595.28;
  const A4_H = 841.89;
  const M    = 32;
  const cW   = A4_W - 2 * M;
  const cH   = A4_H - 2 * M;

  const scale       = cW / fullCanvas.width;
  const totalScaled = fullCanvas.height * scale;
  const numPages    = Math.ceil(totalScaled / cH);

  const pdfDoc = await PDFDocument.create();
  const font   = await pdfDoc.embedFont(StandardFonts.Helvetica);

  // Embed the sig strip and compute its rendered height in PDF points
  const stripImg    = await pdfDoc.embedPng(stripPngBytes);
  const stripAspect = stripImg.height / stripImg.width;
  const stripH      = Math.round(cW * stripAspect); // height in PDF points

  // ── Content pages ────────────────────────────────────────────
  for (let p = 0; p < numPages; p++) {
    const srcY = Math.round(p * cH / scale);
    const srcH = Math.min(Math.round(cH / scale), fullCanvas.height - srcY);

    const slice = document.createElement('canvas');
    slice.width  = fullCanvas.width;
    slice.height = Math.max(srcH, 1);
    slice.getContext('2d').drawImage(fullCanvas, 0, -srcY);

    const jpgDataUrl = slice.toDataURL('image/jpeg', 0.88);
    const jpgBytes   = Uint8Array.from(atob(jpgDataUrl.split(',')[1]), c => c.charCodeAt(0));
    const jpgImg     = await pdfDoc.embedJpg(jpgBytes);
    const drawH      = srcH * scale;

    const page = pdfDoc.addPage([A4_W, A4_H]);

    const isLast = (p === numPages - 1);
    if (isLast) {
      // Leave room for the sig strip at the bottom of the last page
      const availH = Math.min(drawH, cH - stripH - 8);
      page.drawImage(jpgImg, { x: M, y: A4_H - M - availH, width: cW, height: availH });
      // Sig strip flush to the bottom margin
      page.drawImage(stripImg, { x: M, y: M, width: cW, height: stripH });
    } else {
      page.drawImage(jpgImg, { x: M, y: A4_H - M - drawH, width: cW, height: drawH });
    }

    page.drawText(`${p + 1} / ${numPages}`, {
      x: A4_W / 2 - 10, y: 10, size: 7,
      font, color: rgb(0.65, 0.65, 0.65)
    });
  }

  return await pdfDoc.save();
}

/* ══════════════════════════════════════════
   DOWNLOAD SIGNED FILE
   All signed copies are now PDFs (PDFLib output).
══════════════════════════════════════════ */
function downloadSigned() {
  if (!signedBytes || (signedBytes.length !== undefined && signedBytes.length === 0)) {
    alert('אין קובץ להורדה');
    return;
  }

  // Signed copies are always PDF (even for docx/xlsx originals)
  const mime = 'application/pdf';
  const name = currentFileType === 'pdf'
    ? 'חתום_' + currentFileName
    : currentFileName.replace(/\.[^.]+$/, '') + '_חתום.pdf';

  const blob = new Blob([signedBytes], { type: mime });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.style.display = 'none';
  a.href     = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}
</script>
